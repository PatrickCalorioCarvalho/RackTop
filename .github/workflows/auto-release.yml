name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          PATCH=$((PATCH+1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          sed -i "s/version = \"${{ steps.current.outputs.version }}\"/version = \"${{ steps.bump.outputs.new_version }}\"/" Cargo.toml

      - name: Update Chocolatey nuspec
        run: |
          sed -i "s/<version>.*<\/version>/<version>${{ steps.bump.outputs.new_version }}<\/version>/" choco/racktop.nuspec

      - name: Update Snap version
        run: |
          sed -i "s/version: .*/version: '${{ steps.bump.outputs.new_version }}'/" snap/snapcraft.yaml

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create tag
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}

      - name: Add targets
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add x86_64-pc-windows-gnu

      - name: Build Linux
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package artifacts
        run: |
          mkdir dist
          cp target/x86_64-unknown-linux-gnu/release/RackTop dist/RackTop-linux
          cp target/x86_64-pc-windows-gnu/release/RackTop.exe dist/RackTop-windows.exe

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: RackTop v${{ steps.bump.outputs.new_version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}