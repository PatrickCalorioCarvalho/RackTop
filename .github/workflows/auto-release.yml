name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  versioning:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          PATCH=$((PATCH+1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          sed -i "s/version = \"${{ steps.current.outputs.version }}\"/version = \"${{ steps.bump.outputs.new_version }}\"/" Cargo.toml

      - name: Update Chocolatey nuspec
        run: |
          sed -i "s/<version>.*<\/version>/<version>${{ steps.bump.outputs.new_version }}<\/version>/" choco/racktop.nuspec

      - name: Update Snap version
        run: |
          sed -i "s/version: .*/version: '${{ steps.bump.outputs.new_version }}'/" snap/snapcraft.yaml
          
      - name: Ensure lockfile updated
        run: cargo check

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create tag
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}

  build-linux:
    needs: versioning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Linux
        run: cargo build --release

      - name: Package Linux
        run: |
          mkdir dist
          cp target/release/RackTop dist/RackTop-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*

  build-windows:
    needs: versioning
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Windows
        run: cargo build --release

      - name: Package Windows
        run: |
          mkdir dist
          copy target\release\RackTop.exe dist\RackTop-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*

  release:
    needs: [versioning, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.versioning.outputs.new_version }}
          name: RackTop v${{ needs.versioning.outputs.new_version }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  publish-choco:
    needs: [release, versioning]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.versioning.outputs.new_version }}
          fetch-depth: 0

      - name: Set version
        run: |
          echo "VERSION=${{ needs.versioning.outputs.new_version }}" >> $env:GITHUB_ENV

      - name: Download release exe
        run: |
          Invoke-WebRequest `
            "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/RackTop-windows.exe" `
            -OutFile "RackTop-windows.exe"

      - name: Generate SHA256
        run: |
          $hash = (Get-FileHash RackTop-windows.exe -Algorithm SHA256).Hash
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Replace checksum in chocolateyinstall.ps1
        run: |
          (Get-Content choco/tools/chocolateyinstall.ps1) `
            -replace '__CHECKSUM__', '${{ env.SHA256 }}' `
            | Set-Content choco/tools/chocolateyinstall.ps1

      - name: Pack Chocolatey
        run: choco pack choco/racktop.nuspec

      - name: List files
        run: dir

      - name: Push to Chocolatey
        run: |
          choco push racktop.${{ env.VERSION }}.nupkg `
            --source https://push.chocolatey.org/ `
            --api-key $env:CHOCO_API_KEY
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          
  publish-snap:
    needs: [release, versioning]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.versioning.outputs.new_version }}

      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Import Snapcraft credentials
        run: |
          echo "${{ secrets.SNAPCRAFT_LOGIN }}" > snapcraft.login
          snapcraft login --with snapcraft.login

      - name: Build Snap
        run: snapcraft pack

      - name: Upload Snap
        run: |
          snapcraft upload racktop_${{ needs.versioning.outputs.new_version }}_amd64.snap --release=stable